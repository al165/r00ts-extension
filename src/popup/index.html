<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="style.css" rel="stylesheet" />
    <link href="maplibre.css" rel="stylesheet" />
    <title>r00ts</title>
  </head>
  <body>
    <div id="output"></div>
    <script src="script.js"></script>
    <div class="header">
      <div class="logo">
        <span class="logo-title">🫚 r00ts</span>
      </div>
      <div class="header-actions">
        <button class="btn" id="btn-clear">Clear</button>
      </div>
    </div>
    <div id="map" style="width: 100%; height: 300px"></div>
    <button id="details-btn" disabled>See details...</button>
    <div class="col-headers">
      <span class="col-header">IP Address</span>
      <span class="col-header">Host</span>
      <span class="col-header">Network</span>
      <span class="col-header" style="text-align:right">Requests</span>
      <span class="col-header" style="text-align:right">Time</span>
    </div>
    <div class="entries" id="entries-list">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">No requests captured yet</div>
        <div class="empty-sub">Navigate to a page to see IP addresses</div>
      </div>
    </div>
    <div class="footer">
      <span class="footer-stat">Unique IPs: <span id="ip-count">0</span></span>
      <span class="footer-stat">Possible Datacenters: <span id="facility-count">0</span></span>
      <span class="footer-stat">Requests: <span id="req-count">0</span> (Cached: <span id="cached-count">0</span>)</span>
    </div>
  </body>
</html>
