<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="style.css" rel="stylesheet" />
    <link href="maplibre.css" rel="stylesheet" />
    <title>r00ts</title>
  </head>
  <body>
    <div id="contents">
      <div id="map-container">
        <h1>r00ts</h1>
        <div id="map-buildings" class="map-overlay fill"></div>
        <div id="map" class="fill"></div>
        <canvas class="map-overlay fill" id="glyph-render"></canvas>
        <div id="cta">
          <div class="transparent-white">
            <h2><span id="hostname">this website</span> might live here</h2>
            <span id="summary">Rooted on <span id="ip-count">0 IP addresses</span> in <span id="facilities">no datacenters</span> in <span id="cities">0 cities</span></span></div>
          <button id="details-btn">Find out more...</button>
          <label class="custom-check">
            Submit result automatically to community database
            <input id="submitOnView" type="checkbox">
            <span class="checkmark"></span>
          </label>
        </div>
        <div id="ip-info">
          <div id="ip-table-container" class="ip-table-closed">
            <table id="ip-table" >
              <tbody id="ip-body"></tbody>
            </table>
          </div>
        </div>
        <span id="hint-text">No requests captured (yet): refresh the page or navigate to a website to see the results!</span>
        <div id="attribution">
          <button id="attribution-btn">[i]</button>
          <span>
            Map data:
            <a href="https://openfreemap.org/" target="_blank">OpenFreeMap</a>
            <a href="https://www.openmaptiles.org/" target="_blank">© OpenMapTiles</a>
            <a href="https://www.openstreetmap.org/copyright" target="_blank">OpenStreetMap</a>
            Aerial images:
            <a href="https://www.mapbox.com/about/maps" target="_blank">© Mapbox</a>
            <a href="https://www.maxar.com" target="_blank">© Maxar</a>
          </span>
          <br>
          <span>
            <a href="https://github.com/aixdesign/r00ts-extension">View code on Github</a>
            <a href="https://nadiapiet.notion.site/r00ts-Privacy-Policy-39d37d00383380ecb3befa8325c00a6e">Privacy</a>
          </span>
        </div>
      </div>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
