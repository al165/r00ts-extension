<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link href="style.css" rel="stylesheet" />
    <link href="maplibre.css" rel="stylesheet" />
    <title>r00ts</title>
  </head>
  <body>
    <div id="contents">
      <div id="map-container">
        <h1>r00ts</h1>
        <div id="map-buildings" class="map-overlay fill"></div>
        <div id="map" class="fill"></div>
        <canvas class="map-overlay fill" id="glyph-render"></canvas>
        <div id="ip-info">
          <table>
            <tbody id="ip-table"></tbody>
          </table>
          <span id="hint-text">Start navigating on the web to start collecting datacenters!</span>
          <button id="details-btn" disabled>See details...</button>
        </div>
        <div id="stats">
          <table>
            <tbody>
              <tr>
                <td>Unique IPs:</td>
                <td id="ip-count">0</td>
              </tr>
              <tr>
                <td>Datacenters:</td>
                <td id="facility-count">0</td>
              </tr>
              <tr>
                <td>Requests:</td>
                <td id="req-count">0</td>
              </tr>
              <tr>
                <td>(Cached):</td>
                <td id="cached-count">0</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <footer>
      <span>© 2026 AIxDESIGN</span>
      <span>
        Map data: <a href="https://openfreemap.org/" target="_blank">
          OpenFreeMap
        </a>
        <a href="https://www.openmaptiles.org/" target="_blank">
          © OpenMapTiles
        </a>
        Data from
        <a href="https://www.openstreetmap.org/copyright" target="_blank">
          OpenStreetMap
        </a>
        | Aerial images:
        <a href="https://www.mapbox.com/about/maps" target="_blank">
          © Mapbox
        </a>
        <a href="https://www.maxar.com" target="_blank"> © Maxar </a>
      </span>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
